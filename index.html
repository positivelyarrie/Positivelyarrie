<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customizable Creative Portfolio</title>
    <meta
      name="description"
      content="A customizable creative developer portfolio inspired by immersive editorial websites."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="falling-orbs" aria-hidden="true" id="falling-orbs"></div>
    <div class="paint-cursor" aria-hidden="true" id="paint-cursor">
      <span class="paint-cursor-splash"></span>
    </div>
    <div class="paint-droplets" aria-hidden="true" id="paint-droplets"></div>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#hero" id="brand-link">Portfolio</a>
        <nav class="nav" id="nav-links"></nav>
      </header>

      <main id="app">
        <section class="hero reveal" id="hero">
          <p class="eyebrow" id="hero-location"></p>
          <div class="hero-grid">
            <div>
              <p class="hero-kicker" id="hero-kicker"></p>
              <h1 class="hero-title" id="hero-title"></h1>
            </div>
            <div class="hero-copy-wrap">
              <p class="hero-copy" id="hero-copy"></p>
              <div class="hero-actions" id="hero-actions"></div>
            </div>
          </div>
          <div class="hero-marquee">
            <div class="marquee-track" id="marquee-track"></div>
          </div>
        </section>

        <section class="section reveal" id="about">
          <div class="section-label">About</div>
          <div class="section-content split-layout">
            <p class="lead" id="about-lead"></p>
            <div class="stack" id="about-details"></div>
          </div>
        </section>

        <section class="section reveal" id="work">
          <div class="section-label">Selected Work</div>
          <div class="projects" id="projects"></div>
        </section>

        <section class="section reveal" id="services">
          <div class="section-label">Services</div>
          <div class="cards" id="services-list"></div>
        </section>

        <section class="section reveal" id="contact">
          <div class="section-label">Contact</div>
          <div class="section-content contact-layout">
            <div>
              <h2 class="contact-title" id="contact-title"></h2>
              <p class="contact-copy" id="contact-copy"></p>
            </div>
            <div class="stack" id="contact-links"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
